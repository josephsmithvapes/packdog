<!DOCTYPE html>
<html>
<head>
<script>
  var path = window.location.pathname.replace('/packdog', '');
  var search = window.location.search;
  var hash = window.location.hash;
  var url = '/packdog/?p=' + encodeURIComponent(path) + (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') + hash;
  window.location.replace(url);
</script>
</head>
</html>
